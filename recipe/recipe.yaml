context:
  version: "1.0.2"

package:
  name: qtspell
  version: ${{ version }}

source:
  url: https://github.com/manisandro/qtspell/archive/refs/tags/${{ version }}.tar.gz
  sha256: faa7add9d771350a63e66bb6c9b91b130097c2399f6f85c2a9a0ea8e0ceb79d8

build:
  number: 0
  skip: win

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cmake
    - ninja
    - pkg-config
    - doxygen
  host:
    - if: linux
      then:
        - libgl-devel
        - xorg-libxfixes
    - if: osx
      then: libintl-devel
    - qt-main
    - enchant
  run:
    - qt-main
  run_exports:
    - ${{ pin_subpackage('qtspell', upper_bound='x.x') }}

tests:
  - script:
      - test -f $PREFIX/lib/libqtspell-qt5${SHLIB_EXT}

about:
  license: GPL-3.0-only
  license_file: COPYING
  summary: Spell checking for Qt text widgets
  homepage: https://github.com/manisandro/qtspell

extra:
  recipe-maintainers:
    - izahn
