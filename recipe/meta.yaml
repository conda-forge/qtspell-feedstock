{% set name = "qtspell" %}
{% set version = "1.0.2" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/manisandro/qtspell/archive/refs/tags/{{ version }}.tar.gz
  sha256: faa7add9d771350a63e66bb6c9b91b130097c2399f6f85c2a9a0ea8e0ceb79d8

build:
  number: 0
  skip: true  # [not linux]
  run_exports:
    - {{ pin_subpackage('qtspell', max_pin='x.x') }}

requirements:
  build:
    - cmake
    - ninja
    - pkg-config
    - doxygen
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
    - {{ cdt('mesa-libgl-devel') }}  # [linux]
    - {{ cdt('mesa-dri-drivers') }}  # [linux]
    - {{ cdt('libselinux') }}  # [linux]
    - {{ cdt('libxdamage') }}  # [linux]
    - {{ cdt('libxxf86vm') }}  # [linux]
    - {{ cdt('libxext') }}     # [linux]
  host:
    - xorg-libxfixes  # [linux]
    - qt-main
    - enchant
  run:
    - qt-main
    - enchant

test:
  commands:
    - test -f $PREFIX/lib/libqtspell-qt5.so

about:
  home: https://github.com/manisandro/qtspell
  license: GPL-3.0-only
  license_family: GPL3
  license_file: COPYING
  summary: Spell checking for Qt text widgets

extra:
  recipe-maintainers:
    - izahn
